snd_rear_headphone_position 135
snd_spatialization_max_distance 1000
snd_hwcompat                0
snd_occlusion               1
snd_headphone_eq_channel_l  1
snd_headphone_eq_channel_r  1
snd_use_hrtf                1
snd_async_flush              1
