// ---------- 5. MOUSE – giữ nguyên chỉ số cá nhân ----------
m_pitch                     0.022
m_yaw                       0.022
m_rawinput                  1
m_mousespeed                0
sensitivity                 0.31
zoom_sensitivity_ratio      1
m_customaccel               0
m_mouseaccel1               0
m_mouseaccel2               0
m_filter                    0
