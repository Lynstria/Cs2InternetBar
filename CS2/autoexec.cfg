// ---------- 8. CROSSHAIR – giữ nguyên ----------
cl_crosshair_sniper_width   1
cl_crosshair_friendly_warning 0

// ---------- 9. BINDS – giữ nguyên ----------
bind "a" "+left"
bind "s" "+back"
bind "d" "+right"
bind "w" "+forward"
bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "f" "+lookatweapon"
bind "tab" "+showscores"
bind "shift" "+sprint"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE_X" "yaw"
bind "MOUSE_Y" "pitch"
bind "MOUSE3" "player_ping"
bind "MWHEELDOWN" "+jump"
bind "q" "lastinv"
bind "r" "+reload"
bind "MWHEELUP" "slot4"
alias "+dropbomb" "slot5"
alias "-dropbomb" "drop"
bind "alt" "+dropbomb"
bind "SPACE" "+jump"

// ---------- 10. MISC – giữ tên & tùy thích ----------
cl_show_clan_in_death_notice 1
cl_obs_interp_enable        1
cl_obs_interp_pos_rate      0.27
cl_refresh_rate_recommendation_dont_show_again 0
cl_join_advertise           2
cl_disablefreezecam         1
cl_net_showevents           0
demo_flush                  0
con_enable                  1
con_filter_enable           0
developer                   0
safezonex                   1.0
safezoney                   1.0
adsp_debug                  0
battery_saver               0

// ---------- 11. INPUT-LAG & SUB-TICK – bản quyền Việt Hoá ----------
