cl_hud_telemetry_ping_show  2
cl_hud_telemetry_net_misdelivery_show 2
cl_hud_background_alpha     0.5
cl_hud_bomb_under_radar     1
cl_show_team_equipment      1
cl_hud_healthammo_style     0
