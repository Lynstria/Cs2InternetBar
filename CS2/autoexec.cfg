engine_low_latency_sleep_after_server_tick 1
engine_no_focus_sleep       0
cl_input_force_new_sampler  1
cl_predict                  1
cl_predictweapons           1
cl_smooth                   1
cl_smoothtime               0.01
cl_lagcompensation          1

// ---------- 12. KHỞI ĐỘNG ----------
host_writeconfig
echo "══════════════════════════════════════"
