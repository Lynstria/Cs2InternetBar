// ================================================================
//  CS2 OPTIMIZED – VER. 2025 | legal & clean
// ================================================================

// ---------- 0. LAUNCH SAFE – reset rác trước khi set mới ----------
cl_autohelp                 0
gameinstructor_enable       0
cl_disablehtmlmotd          1
cl_sanitize_player_names    0
cl_promoted_settings_acknowledged 0:0
cl_graphics_driver_warning_dont_show_again 1
player_nevershow_communityservermessage 1

// ---------- 1. NETWORK – sub-tick mượt, không jitter ----------
rate                        786432
cl_cmdrate                  128
cl_updaterate               128
cl_interp                   0
cl_interp_ratio             1
cl_lagcompensation          1
cl_net_buffer_ticks         0
cl_net_buffer_voice         0
net_maxroutable             1260
net_splitrate               2
cl_timeout                  30
mm_dedicated_search_maxping 60

// ---------- 2. PERFORMANCE – khử drop fps, full-core ----------
fps_max                     500          // unlock hoàn toàn
fps_max_menu                120
fps_max_tools               60
fps_max_ui                  0
mat_queue_mode              2
r_multicore                 1
cl_threaded_bone_setup      1
cl_async_bone_setup         1
r_threaded_renderables      1
r_threaded_particles        1
r_queued_ropes              1
r_queued_decals             1
r_queued_post_processing    1
r_shader_compile_threads    4
engine_frame_time_smoothing_scale 0.01
cl_forcepreload             1          // tránh stutter khi quay nhanh
func_break_max_pieces       0

// ---------- 3. GRAPHICS – low-latency, low-lag, sáng ----------
mat_vsync                   0
mat_picmip                  4
mat_reduceparticles         1
mat_forceaniso              1
mat_setnowindowborder       1
mat_disable_bloom           1
mat_powersavingsmode        0
mat_monitorgamma            3
mat_compressedtextures      1
mat_reducefillrate          1
mat_specular                0
mat_phong                   0
mat_bumpmap                 0
mat_parallaxmap             0
mat_postprocess_enable      0
r_dynamic                   0
r_drawparticles             1
r_drawtracers_firstperson   1
r_drawtracers               1
r_decals                    0
r_decal_cullsize            1
r_eyegloss                  0
r_eyemove                   0
r_eyes                      0
r_player_visibility_mode    1
r_show_build_info           0
cl_ragdoll_physics_enable   0
cl_phys_props_enable        0
cl_disable_ragdolls         1
cl_particle_fallback_multiplier 0
cl_weapon_debug_show_accuracy 0
muzzleflash_light           0
cl_ejectbrass               0
r_shader_cache              1
r_drawworld                 1
r_drawstaticworld           1
r_drawentities              1
fps_max_splitscreen         0

// ---------- 4. AUDIO – HRTF rõ tiếng bước chân ----------
snd_mixahead                0.025
snd_autodetect_latency      1
snd_headphone_eq            1
snd_spatialize_lerp         0.2
snd_menumusic_volume        0.0
snd_tensecondwarning_volume 0.25
snd_steamaudio_enable_perspective_correction 1
snd_mix_async               1
snd_pitchquality            1
snd_legacy_surround         0
snd_hrtf_distance_behind    45
snd_hrtf                    1
snd_hrtf_curve              0.5
snd_gain                    1
snd_gamevoicevolume         1
